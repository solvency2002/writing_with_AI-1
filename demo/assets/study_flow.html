<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Writing with AI workflow</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .figure {
      width: 960px;
      padding: 48px;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      align-items: stretch;
    }
    .box {
      border: 3px solid #1d4ed8;
      background: #dbeafe;
      padding: 22px;
      min-height: 92px;
    }
    .box:last-child {
      background: #dcfce7;
      border-color: #15803d;
    }
    h1 {
      margin: 0 0 30px;
      font-size: 34px;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="figure">
    <h1>Writing with AI workflow</h1>
    <section class="row">
      <div class="box"><h2>Draft</h2><p>Write in Markdown.</p></div>
      <div class="box"><h2>Citations</h2><p>Use only refs.bib.</p></div>
      <div class="box"><h2>Figures</h2><p>Store assets locally.</p></div>
      <div class="box"><h2>Output</h2><p>Render to docx.</p></div>
    </section>
  </main>
</body>
</html>
